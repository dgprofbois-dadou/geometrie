<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éditeur d'exercices — Géométrie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --surface: #2a2a3e;
      --surface2: #313145;
      --border: #3f3f5a;
      --accent: #7c9eff;
      --accent2: #a5c8ff;
      --text: #cdd6f4;
      --text-muted: #7f849c;
      --danger: #f38ba8;
      --success: #a6e3a1;
      --warn: #f9e2af;
      --highlight: rgba(124,158,255,.15);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
      flex: 1;
    }

    .topbar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
    }
    .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
    .topbar-btn.primary { background: var(--accent); color: #0f0f1a; border-color: var(--accent); }
    .topbar-btn.primary:hover { filter: brightness(1.1); color: #0f0f1a; }

    /* ── 3-column layout ── */
    #workspace {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ── */
    #left-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .panel-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .panel-section h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }

    .form-row label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .form-row input[type=text],
    .form-row input[type=number],
    .form-row input[type=url],
    .form-row textarea,
    .form-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 12px;
      padding: 5px 8px;
      width: 100%;
      transition: border-color .12s;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-row textarea { resize: vertical; min-height: 60px; font-family: inherit; }

    .img-preview {
      width: 100%;
      max-height: 120px;
      object-fit: contain;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-top: 6px;
      display: none;
    }

    .upload-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .12s;
    }
    .upload-label:hover { color: var(--text); border-color: var(--accent); }

    /* ── Canvas center ── */
    #center-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0f0f1a;
      position: relative;
    }

    #canvas-toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      flex-wrap: nowrap;
      scrollbar-width: thin;
    }
    .ctool-btn.role-active {
      background: var(--highlight);
      border-color: var(--accent);
      color: var(--accent);
    }
    #canvas-container { flex: 1; position: relative; overflow: hidden; }

    .ctool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      transition: all .12s;
      min-width: 52px;
    }
    .ctool-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .ctool-btn:hover { background: var(--highlight); border-color: var(--border); color: var(--text); }
    .ctool-btn.active { background: var(--highlight); border-color: var(--accent); color: var(--accent); }

    .ctool-sep { width: 1px; height: 32px; background: var(--border); margin: 0 4px; }

    #canvas-info {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
      background: rgba(0,0,0,.5);
      padding: 2px 8px;
      border-radius: 4px;
      pointer-events: none;
    }

    #canvas-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,0,0,.6);
      padding: 4px 12px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    #canvas-hint.visible { opacity: 1; }

    #geo-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

    /* ── Right panel ── */
    #right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #right-panel-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .collapsible-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }
    .collapsible-header:hover { background: var(--highlight); }
    .collapsible-header h3 { margin: 0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .collapsible-toggle { font-size: 11px; color: var(--text-muted); transition: transform .2s; }
    .collapsible-toggle.open { transform: rotate(180deg); }
    .collapsible-body { overflow: hidden; transition: max-height .2s ease; }
    .collapsible-body.collapsed { max-height: 0 !important; }

    #right-panel > .panel-section:first-child { flex-shrink: 0; }

    #questions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #questions-header h3 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
    }

    #btn-add-question {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all .12s;
    }
    #btn-add-question:hover { background: var(--highlight); }

    #questions-list {
      flex: 0 0 auto;
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: thin;
      border-bottom: 1px solid var(--border);
    }

    .q-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 12px;
      transition: background .1s;
      border-left: 3px solid transparent;
    }
    .q-item:hover { background: var(--highlight); }
    .q-item.active { background: var(--highlight); border-left-color: var(--accent); }
    .q-item-num { font-weight: 700; color: var(--accent); min-width: 20px; }
    .q-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); font-size: 11px; }
    .q-item-obj-count {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 8px;
    }
    .q-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 0 3px;
      opacity: 0;
      transition: opacity .12s;
    }
    .q-item:hover .q-delete { opacity: 1; }
    .q-delete:hover { color: var(--danger); }

    /* Question editor */
    #question-editor {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      padding: 12px 14px;
    }

    #question-editor h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    #question-editor .no-q {
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
      text-align: center;
      margin-top: 24px;
    }

    /* Zone checkboxes */
    .zone-checks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin: 6px 0 10px;
    }

    .zone-check {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 5px 4px;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      transition: all .12s;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .zone-check input { cursor: pointer; accent-color: var(--accent); }
    .zone-check:has(input:checked) {
      border-color: var(--accent);
      background: rgba(124,158,255,.1);
      color: var(--accent);
    }

    /* Ref objects list */
    #ref-objects-list {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .ref-obj-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      font-size: 11px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      cursor: pointer;
    }
    .ref-obj-item:last-child { border-bottom: none; }
    .ref-obj-item:hover { background: var(--highlight); }
    .ref-obj-item.selected { background: rgba(137,180,250,.18); border-left: 2px solid #89b4fa; }
    .ref-obj-type-header {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 4px 8px 2px;
      background: rgba(0,0,0,.2);
      border-bottom: 1px solid var(--border);
    }

    .ref-obj-icon { font-size: 14px; flex-shrink: 0; }
    .ref-obj-coords { flex: 1; font-family: monospace; color: var(--text-muted); font-size: 10px; }
    .ref-obj-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      opacity: 0;
      transition: opacity .12s;
    }
    .ref-obj-item:hover .ref-obj-del { opacity: 1; }
    .ref-obj-del:hover { color: var(--danger); }

    .empty-objects {
      padding: 10px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Tolerance row */
    .tolerance-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      margin-top: 6px;
    }
    .tolerance-row label { color: var(--text-muted); font-size: 11px; }
    .tolerance-row input { width: 70px; }

    /* small tag button */
    .tag-btn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      transition: all .12s;
      font-weight: 600;
    }
    .tag-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Panneau propriétés objet ── */
    #obj-props-panel {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface2);
    }
    #obj-props-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
    }
    #obj-props-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    #obj-props-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
    }
    #obj-props-close:hover { color: var(--danger); }
    #obj-props-body {
      padding: 8px 12px;
    }
    #obj-props-body .form-row {
      margin-bottom: 7px;
    }

    /* ── Boutons rôle / style ── */
    .role-btn, .ls-btn {
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all .1s;
    }
    .role-btn:hover, .ls-btn:hover { border-color: var(--accent); color: var(--accent); }
    .role-active { background: var(--accent) !important; color: #0f0f1a !important; border-color: var(--accent) !important; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Left panel collapsible sections */
    .left-panel-toggle {
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0;
    }
    .left-panel-toggle:hover { color: var(--accent); }
    .left-chevron { font-size: 10px; transition: transform .2s; }
    .left-chevron.collapsed { transform: rotate(-90deg); }
    .left-collapsible-body { overflow: hidden; transition: max-height .2s ease; }
    .left-collapsible-body.collapsed { max-height: 0 !important; }

    /* Algebra list (objects panel) */
    .algebra-item {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; font-size: 11px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background .1s;
    }
    .algebra-item:hover { background: var(--highlight); }
    .algebra-item.selected { background: rgba(137,180,250,.18); border-left: 2px solid var(--accent); }
    .algebra-item.hidden-obj { opacity: 0.4; }
    .algebra-color { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .algebra-label { font-weight: 600; min-width: 20px; }
    .algebra-def { flex: 1; color: var(--text-muted); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .algebra-eye { background: none; border: none; cursor: pointer; padding: 0 2px; font-size: 12px; opacity: 0; transition: opacity .15s; }
    .algebra-item:hover .algebra-eye { opacity: 1; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <a href="index.html" class="topbar-btn" title="Retour à l'application">← Retour</a>
  <h1>Éditeur d'exercices — Représentation orthographique</h1>
  <span id="autosave-status" style="font-size:10px;color:var(--text-muted)">—</span>
  <button class="topbar-btn" id="btn-test" title="Tester dans l'application (nouvel onglet)">▶ Tester</button>
  <button class="topbar-btn" id="btn-preview-json" title="Aperçu JSON">{ } JSON</button>
  <button class="topbar-btn primary" id="btn-editor-export">⬇ Exporter .js</button>
</div>

<!-- Workspace -->
<div id="workspace">

  <!-- ── LEFT: Exercise metadata ── -->
  <div id="left-panel">
    <div class="panel-section collapsible-section">
      <h3 class="collapsible-header left-panel-toggle" data-target="left-meta-body">
        Métadonnées <span class="left-chevron">▼</span>
      </h3>
      <div id="left-meta-body" class="left-collapsible-body">
        <div class="form-row">
          <label>Titre de l'exercice</label>
          <input type="text" id="ex-title" placeholder="Ex : Représentation orthographique n°1" value="">
        </div>

        <div class="form-row">
          <label>Instructions générales</label>
          <textarea id="ex-global-instructions" placeholder="Consigne générale visible au départ de l'exercice…" rows="3"></textarea>
        </div>

        <div class="form-row">
          <label>Image de référence (URL)</label>
          <input type="url" id="ex-image-url" placeholder="https://…/image.png">
          <div class="upload-row">
            <span style="font-size:11px;color:var(--text-muted)">ou</span>
            <label class="upload-label">
              📂 Importer un fichier
              <input type="file" id="ex-image-file" accept="image/*" style="display:none">
            </label>
          </div>
          <img id="ex-image-preview" class="img-preview" alt="Aperçu">
        </div>

        <div class="form-row">
          <label>Nombre total de questions</label>
          <input type="number" id="ex-total-questions" value="1" min="1" max="20">
        </div>
      </div>
    </div>

    <div class="panel-section collapsible-section">
      <h3 class="collapsible-header left-panel-toggle" data-target="left-canvas-body">
        Options canvas <span class="left-chevron">▼</span>
      </h3>
      <div id="left-canvas-body" class="left-collapsible-body">
        <div class="form-row">
          <label>Grille (unités)</label>
          <select id="opt-grid">
            <option value="1" selected>1 unité</option>
            <option value="0.5">0.5 unité</option>
            <option value="2">2 unités</option>
          </select>
        </div>
        <div class="form-row">
          <label>Zoom initial</label>
          <select id="opt-zoom">
            <option value="40">40 px/u (éloigné)</option>
            <option value="60" selected>60 px/u (normal)</option>
            <option value="80">80 px/u (proche)</option>
            <option value="100">100 px/u (très proche)</option>
          </select>
        </div>
        <div class="form-row">
          <label>Couleur des objets référence</label>
          <input type="color" id="opt-ref-color" value="#f38ba8">
        </div>
      </div>
    </div>

    <div class="panel-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0">
      <h3 style="padding:10px 14px 6px;margin:0;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);flex-shrink:0">Objets</h3>
      <div id="algebra-list" style="flex:1;overflow-y:auto;scrollbar-width:thin"></div>
    </div>
  </div>

  <!-- ── CENTER: Canvas ── -->
  <div id="center-panel">
    <div id="canvas-toolbar">
      <button class="tool-btn ctool-btn active" data-tool="select" title="Sélectionner / Déplacer (S)">
        <svg viewBox="0 0 24 24"><path d="M4 2l16 9-7 2-3 7z"/></svg>
        Sélect.
      </button>
      <button class="tool-btn ctool-btn" data-tool="lasso" title="Sélection par lasso">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5"/></svg>
        Lasso
      </button>
      <button class="tool-btn ctool-btn" id="btn-join-group" title="Joindre la sélection en groupe (Ctrl+Shift+G)">
        <svg viewBox="0 0 24 24"><circle cx="7" cy="7" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="17" cy="7" r="3" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="2"/><line x1="10" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="10" x2="12" y2="14" stroke="currentColor" stroke-width="1.5"/><line x1="15" y1="10" x2="12" y2="14" stroke="currentColor" stroke-width="1.5"/></svg>
        Joindre
      </button>
      <button class="tool-btn ctool-btn" id="btn-explode-group" title="Éclater le groupe sélectionné">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="6" height="6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="9" y1="9" x2="4" y2="4" stroke="currentColor" stroke-width="1.5"/><line x1="15" y1="9" x2="20" y2="4" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="15" x2="4" y2="20" stroke="currentColor" stroke-width="1.5"/><line x1="15" y1="15" x2="20" y2="20" stroke="currentColor" stroke-width="1.5"/></svg>
        Éclater
      </button>
      <div class="ctool-sep"></div>
      <button class="tool-btn ctool-btn" data-tool="point" title="Point (P)">

<script>
'use strict';

// ══════════════════════════════════════════════════════
// EXERCISE DATA MODEL
// ══════════════════════════════════════════════════════

const exerciseData = {
  title: '',
  globalInstructions: '',
  imageUrl: '',
  totalQuestions: 1,
  refColor: '#f38ba8',
  gridUnit: 1,
  initialZoom: 60,
  allowedTools: [],
  questions: []  // array of Question objects
};

// Question shape:
// { id, num, instructions, activeZones: Set, tolerance, pointsPerCorrect,
//   geoState: [], roleMap: { objId -> 'given'|'expected' } }
// geoState = serialized geometry.js state.objects for this question.

let nextObjId = 1;
let currentQuestionId = null;

// ── Zone definitions ──────────────────────────────
const ZONE_IDS = ['zone-top', 'zone-center', 'zone-left', 'zone-bottom', 'zone-right'];
const ZONE_LABELS = {
  'zone-top': 'Dessus', 'zone-center': 'Face',
  'zone-left': 'Gauche', 'zone-bottom': 'Dessous', 'zone-right': 'Droite'
};
// Zone position in the 3x3 grid (row, col) 0-indexed
const ZONE_GRID = {
  'zone-top':    { row: 0, col: 1 },
  'zone-left':   { row: 1, col: 0 },
  'zone-center': { row: 1, col: 1 },
  'zone-right':  { row: 1, col: 2 },
  'zone-bottom': { row: 2, col: 1 }
};

// ── Helpers ───────────────────────────────────────
function genId() { return ++nextObjId; }
function currentQuestion() { return exerciseData.questions.find(q => q.id === currentQuestionId) || null; }

// ══════════════════════════════════════════════════════
// GEOMETRY.JS INTEGRATION  (canvas powered by geometry.js)
// ══════════════════════════════════════════════════════
// state, render, deleteObject, geoApp are globals from geometry.js.

const COLOR_GIVEN = '#f9e2af';
function refColor() {
  return document.getElementById('opt-ref-color').value || '#f38ba8';
}

// Rôle courant pour les nouveaux objets
let _currentRole = 'expected';

// All objects of the current geometry scene (excluding internal __ objects)
function getRefObjects() {
  return state.objects.filter(o => !o.label.startsWith('__'));
}

function getRole(objId) {
  const q = currentQuestion();
  return q && q.roleMap && q.roleMap[objId] ? q.roleMap[objId] : 'expected';
}

function applyRoleColor(obj, role) {
  obj.color = role === 'given' ? COLOR_GIVEN : refColor();
}

function setRole(objId, role) {
  const q = currentQuestion();
  if (!q) return;
  if (!q.roleMap) q.roleMap = {};
  q.roleMap[objId] = role;
  const obj = state.objects.find(o => o.id === objId);
  if (obj) applyRoleColor(obj, role);
  render();
  syncRefObjPanel();
  scheduleSave();
}

// ── Per-question geometry state ───────────────────
function saveCurrentGeoState() {
  const q = currentQuestion();
  if (!q) return;
  q.geoState = JSON.parse(JSON.stringify(state.objects));
}

function loadGeoState(q) {
  state.objects = q && q.geoState ? JSON.parse(JSON.stringify(q.geoState)) : [];
  state.selected = [];
  state.tempPoints = [];
  _selectedObjId = null;
  hideObjProps();
  if (typeof evalAll === 'function') evalAll();
  render();
  if (typeof updateAlgebra === 'function') updateAlgebra();
}

// ── Add listener: tag new objects with current role ──
geoApp.registerAddListener(function(name) {
  if (name.startsWith('__')) return;
  const q = currentQuestion();
  if (!q) return;
  const obj = state.objects.find(o => o.label === name);
  if (!obj) return;
  if (!q.roleMap) q.roleMap = {};
  q.roleMap[obj.id] = _currentRole;
  applyRoleColor(obj, _currentRole);
  render();
  syncRefObjPanel();
  syncQuestionList();
  scheduleSave();
});

// ── Coordinate readout under the cursor ───────────
(function() {
  const cv = document.getElementById('geo-canvas');
  cv.addEventListener('mousemove', function(e) {
    const rect = cv.getBoundingClientRect();
    const wx = state.ox + (e.clientX - rect.left - cv.width / 2) / state.scale;
    const wy = state.oy - (e.clientY - rect.top - cv.height / 2) / state.scale;
    const info = document.getElementById('canvas-info');
    if (info) info.textContent = 'x = ' + wx.toFixed(2) + ' · y = ' + wy.toFixed(2);
  });
})();

// ── Role toggle in the canvas toolbar ─────────────
document.getElementById('ed-role-given').addEventListener('click', () => {
  _currentRole = 'given';
  document.getElementById('ed-role-given').classList.add('role-active');
  document.getElementById('ed-role-expected').classList.remove('role-active');
});
document.getElementById('ed-role-expected').addEventListener('click', () => {
  _currentRole = 'expected';
  document.getElementById('ed-role-expected').classList.add('role-active');
  document.getElementById('ed-role-given').classList.remove('role-active');
});

// ── Grid / axes / zoom buttons → geometry.js ──────
document.getElementById('ed-btn-grid').addEventListener('click', function() {
  toggleGrid();
  this.classList.toggle('active', state.showGrid);
});
document.getElementById('ed-btn-axes').addEventListener('click', function() {
  state.showAxes = !state.showAxes;
  this.classList.toggle('active', state.showAxes);
  render();
});
document.getElementById('ed-btn-zoom-in').addEventListener('click', () => zoom(1.2));
document.getElementById('ed-btn-zoom-out').addEventListener('click', () => zoom(1 / 1.2));
document.getElementById('ed-btn-zoom-fit').addEventListener('click', () => fitView());

// ── Snap controls ─────────────────────────────────
state.snapUnit = 1; // default snap unit
document.getElementById('ed-btn-snap').addEventListener('click', function() {
  // Toggle snap: set snapUnit to null (off) or restore from selector
  const isOn = this.classList.toggle('active');
  if (isOn) {
    state.snapUnit = parseFloat(document.getElementById('ed-snap-unit').value) || 1;
  } else {
    state.snapUnit = 0; // 0 = no snap
  }
});
document.getElementById('ed-snap-unit').addEventListener('change', function() {
  state.snapUnit = parseFloat(this.value) || 1;
  // Ensure snap is active when unit changes
  document.getElementById('ed-btn-snap').classList.add('active');
});

document.getElementById('opt-ref-color').addEventListener('input', () => {
  // Re-apply colours to "expected" objects of the current scene
  const q = currentQuestion();
  if (q) {
    getRefObjects().forEach(o => { if (getRole(o.id) === 'expected') applyRoleColor(o, 'expected'); });
  }
  render();
});
document.getElementById('opt-grid').addEventListener('change', () => render());
document.getElementById('opt-zoom').addEventListener('change', function() {
  state.scale = parseInt(this.value) || 60;
  render();
});

// ── Object properties panel ───────────────────────
let _selectedObjId = null;

function showObjProps(obj) {
  const panel = document.getElementById('obj-props-panel');
  panel.style.display = 'block';
  const role = getRole(obj.id);
  document.getElementById('op-label').value = obj.label || '';
  document.getElementById('op-color').value = (obj.color && obj.color[0] === '#') ? obj.color : '#f38ba8';
  document.getElementById('op-lw').value = obj.lineWidth ?? 2;
  document.getElementById('op-lw-val').textContent = obj.lineWidth ?? 2;
  document.getElementById('op-opacity').value = Math.round((obj.opacity ?? 1) * 100);
  document.getElementById('op-opacity-val').textContent = Math.round((obj.opacity ?? 1) * 100) + '%';
  document.getElementById('op-role-given').classList.toggle('role-active', role === 'given');
  document.getElementById('op-role-expected').classList.toggle('role-active', role !== 'given');
  const dashed = obj.lineStyle === 3 || obj.lineStyle === 'dashed';
  document.getElementById('op-ls-solid').classList.toggle('role-active', !dashed);
  document.getElementById('op-ls-dashed').classList.toggle('role-active', dashed);
  document.getElementById('op-dash-config').style.display = 'none';
  // Visibility / label / fixed
  document.getElementById('op-visible').checked = obj.visible !== false;
  document.getElementById('op-show-label').checked = obj.showLabel !== false;
  const labelMode = obj.labelMode || 'name';
  document.getElementById('op-label-mode').value = labelMode;
  document.getElementById('op-label-mode-row').style.display = obj.showLabel === false ? 'none' : '';
  document.getElementById('op-fixed').checked = !!obj.fixed;
}

function hideObjProps() {
  document.getElementById('obj-props-panel').style.display = 'none';
}

function getSelectedObj() {
  if (state.selected && state.selected.length) {
    const o = state.objects.find(o => o.id === state.selected[0]);
    if (o) return o;
  }
  if (_selectedObjId) {
    const o = state.objects.find(o => o.id === _selectedObjId);
    if (o) return o;
  }
  return null;
}

// Poll selection so the properties panel follows geometry.js selection
setInterval(() => {
  const obj = getSelectedObj();
  if (obj) {
    if (_selectedObjId !== obj.id) {
      _selectedObjId = obj.id;
      showObjProps(obj);
      syncRefObjPanel(); // highlight in list
    }
  } else if (_selectedObjId !== null) {
    _selectedObjId = null; hideObjProps();
    syncRefObjPanel();
  }
}, 200);

// ══════════════════════════════════════════════════════
// REF OBJECT MANAGEMENT
// ══════════════════════════════════════════════════════

// Thin wrapper for the "remove from list" button in the right panel
function removeRefObject(objId) {
  const q = currentQuestion();
  if (!q) return;
  const obj = state.objects.find(o => o.id === objId);
  if (obj) geoApp.deleteObject(obj.label);
  if (q.roleMap) delete q.roleMap[objId];
  if (_selectedObjId === objId) { _selectedObjId = null; hideObjProps(); }
  syncRefObjPanel();
  syncQuestionList();
  render();
}

// ══════════════════════════════════════════════════════
// QUESTION MANAGEMENT
// ══════════════════════════════════════════════════════

let questionCounter = 0;

function addQuestion() {
  questionCounter++;
  const q = {
    id: genId(),
    num: questionCounter,
    instructions: '',
    activeZones: new Set(['zone-center']),
    tolerance: 3,
    pointsPerCorrect: 1,
    geoState: [],
    roleMap: {},
    figureGroups: []
  };
  exerciseData.questions.push(q);
  selectQuestion(q.id);
  syncQuestionList();
  syncTotalQuestions();
}

function deleteQuestion(id) {
  const idx = exerciseData.questions.findIndex(q => q.id === id);
  if (idx < 0) return;
  exerciseData.questions.splice(idx, 1);
  // Re-number
  exerciseData.questions.forEach((q, i) => q.num = i + 1);
  if (currentQuestionId === id) {
    const next = exerciseData.questions[Math.min(idx, exerciseData.questions.length - 1)];
    currentQuestionId = next ? next.id : null;
  }
  syncQuestionList();
  renderQuestionEditor();
  syncTotalQuestions();
}

function selectQuestion(id) {
  saveCurrentGeoState(); // save before switching
  currentQuestionId = id;
  syncQuestionList();
  renderQuestionEditor();
  // Update canvas label
  const q = currentQuestion();
  document.getElementById('canvas-q-label').textContent = q ? 'Q' + q.num : '';
  if (q) {
    loadGeoState(q);
    // Show zones on canvas if active
    if (q.activeZones && q.activeZones.size > 0) {
      geoApp.defineZones([...q.activeZones], 8, 6, 0.5);
    } else {
      geoApp.hideZones();
    }
    // Afficher les pivots ⊕ des figureGroups dans l'éditeur
    syncFigureGroupsToCanvas(q);
  }
}

function syncTotalQuestions() {
  exerciseData.totalQuestions = exerciseData.questions.length;
  document.getElementById('ex-total-questions').value = exerciseData.questions.length;
}

// ── Question list UI ──────────────────────────────
function syncQuestionList() {
  const list = document.getElementById('questions-list');
  list.innerHTML = '';
  exerciseData.questions.forEach(q => {
    const div = document.createElement('div');
    div.className = 'q-item' + (q.id === currentQuestionId ? ' active' : '');
    div.innerHTML = `
      <span class="q-item-num">Q${q.num}</span>
      <span class="q-item-title">${q.instructions || '(sans consigne)'}</span>
      <span class="q-item-obj-count">${(q.id === currentQuestionId ? getRefObjects().length : (q.geoState ? q.geoState.filter(o => !o.label.startsWith('__')).length : 0))} obj.</span>
      <button class="q-delete" title="Supprimer">✕</button>
    `;
    div.addEventListener('click', e => {
      if (e.target.classList.contains('q-delete')) { deleteQuestion(q.id); return; }
      selectQuestion(q.id);
    });
    list.appendChild(div);
  });
}

// ── Question editor UI ────────────────────────────
function renderQuestionEditor() {
  const editor = document.getElementById('question-editor');
  const q = currentQuestion();

  if (!q) {
    editor.innerHTML = '<div class="no-q">Sélectionnez ou créez une question.</div>';
    return;
  }

  editor.innerHTML = `
    <h4>Question ${q.num}</h4>

    <div class="form-row">
      <label>Consigne de la question</label>
      <textarea id="q-instructions" rows="3" placeholder="Ex : Tracez la vue de face du solide.">${q.instructions}</textarea>
    </div>

    <div class="form-row">
      <label>Tolérance de distance (unités)</label>
      <div class="tolerance-row">
        <input type="number" id="q-tolerance" value="${q.tolerance}" min="0.05" max="20" step="0.5" style="width:80px">
        <span style="font-size:11px;color:var(--text-muted)">unités monde</span>
      </div>
    </div>

    <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px">Zones orthographiques actives</label>
    <div class="zone-checks" id="zone-checks-grid">
      ${buildZoneChecks(q)}
    </div>

    <div class="form-row">
      <label>Points par tracé correct</label>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" id="q-pts" value="${q.pointsPerCorrect ?? 1}" min="0" max="10" step="0.5" style="width:60px">
        <span style="font-size:10px;color:var(--text-muted)">pt/objet</span>
      </div>
    </div>

    <h4 style="margin-top:4px">Objets de référence</h4>
    <div style="display:flex;gap:4px;margin-bottom:6px;align-items:center;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--text-muted)">Prochain objet :</span>
      <button class="role-btn ${_currentRole==='given'?'role-active':''}"    id="toggle-role-given">Donné</button>
      <button class="role-btn ${_currentRole==='expected'?'role-active':''}" id="toggle-role-expected">À tracer</button>
    </div>
    <div id="ref-objects-list"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
      <button class="tag-btn" id="q-add-point">+ Point</button>
      <button class="tag-btn" id="q-add-segment">+ Segment</button>
      <button class="tag-btn" id="q-clear-objs" style="color:var(--danger)">✕ Tout effacer</button>
    </div>

    <h4 style="margin-top:10px">Figures déplaçables (Drag &amp; Drop)</h4>
    <div id="figure-groups-list" style="font-size:11px;margin-bottom:6px">
      ${buildFigureGroupsList(q)}
    </div>
    <button class="tag-btn" id="btn-create-group" title="Sélectionner des objets sur le canvas puis cliquer ici">+ Grouper la sélection</button>
  `;

  // Wire inputs
  document.getElementById('q-instructions').addEventListener('input', function() {
    q.instructions = this.value;
    syncQuestionList();
  });

  document.getElementById('q-tolerance').addEventListener('input', function() {
    q.tolerance = parseFloat(this.value) || 0.5;
  });

  document.getElementById('q-pts').addEventListener('input', function() {
    q.pointsPerCorrect = parseFloat(this.value) ?? 1;
  });

  // Toggles rôle courant
  function syncRoleButtons() {
    document.getElementById('ed-role-given').classList.toggle('role-active', _currentRole === 'given');
    document.getElementById('ed-role-expected').classList.toggle('role-active', _currentRole === 'expected');
  }
  document.getElementById('toggle-role-given').addEventListener('click', () => {
    _currentRole = 'given'; syncRoleButtons(); renderQuestionEditor();
  });
  document.getElementById('toggle-role-expected').addEventListener('click', () => {
    _currentRole = 'expected'; syncRoleButtons(); renderQuestionEditor();
  });

  document.querySelectorAll('.zone-cb').forEach(cb => {
    cb.addEventListener('change', function() {
      if (this.checked) q.activeZones.add(this.value);
      else q.activeZones.delete(this.value);
      // Update canvas zones immediately
      if (q.activeZones.size > 0) geoApp.defineZones([...q.activeZones], 8, 6, 0.5);
      else geoApp.hideZones();
    });
  });

  document.getElementById('q-add-point').addEventListener('click', () => {
    setTool('point');
    showHint('Cliquez sur le canvas pour placer un point de référence');
  });

  document.getElementById('q-add-segment').addEventListener('click', () => {
    setTool('segment');
    showHint('Cliquez pour placer le 1er point du segment de référence');
  });

  document.getElementById('q-clear-objs').addEventListener('click', () => {
    if (!confirm('Supprimer tous les objets de référence de cette question ?')) return;
    getRefObjects().forEach(o => geoApp.deleteObject(o.label));
    if (q.roleMap) q.roleMap = {};
    syncRefObjPanel();
    syncQuestionList();
    render();
  });

  document.getElementById('btn-create-group').addEventListener('click', () => {
    const sel = state.selected.slice();
    if (sel.length === 0) { alert('Sélectionnez d\'abord des objets sur le canvas (outil Sélect. ou Lasso).'); return; }
    const name = prompt('Nom de la figure :', 'Figure ' + ((q.figureGroups||[]).length + 1));
    if (!name) return;
    const activeZoneIds = [...(q.activeZones || ['zone-center'])];
    const zoneChoice = activeZoneIds.length > 1
      ? prompt('Zone cible (' + activeZoneIds.map(z => ZONE_LABELS[z]).join(', ') + ') :', ZONE_LABELS[activeZoneIds[0]])
      : ZONE_LABELS[activeZoneIds[0]];
    const targetZoneId = activeZoneIds.find(z => ZONE_LABELS[z] === zoneChoice) || activeZoneIds[0];
    // Compute centroid
    let cx = 0, cy = 0, n = 0;
    sel.forEach(id => {
      const o = state.objects.find(ob => ob.id === id);
      if (!o) return;
      if (o.x != null) { cx += o.x; cy += o.y; n++; }
    });
    if (n === 0) { alert('Aucun objet positionnable sélectionné.'); return; }
    cx /= n; cy /= n;
    // Create pivot point at centroid (= target position)
    const pivotLabel = '__fg_pivot_' + Date.now();
    const pivot = { id: uid(), type: 'point', label: pivotLabel, x: cx, y: cy, visible: false, fixed: false, color: '#89b4fa' };
    state.objects.push(pivot);
    if (!q.figureGroups) q.figureGroups = [];
    // Compute start (palette) position: row above zones
    const groupIndex = q.figureGroups.length;
    const topY = 9.5 + 2.5; // above zone-top (which ends at ~9.5 with default layout)
    const spacing = 5;
    const startX = -(groupIndex * spacing / 2) + groupIndex * spacing;
    const startY = topY;
    const fgId = 'fg_' + Date.now();
    q.figureGroups.push({ id: fgId, label: name, objectIds: sel, pivotId: pivot.id, pivotLabel, targetZoneId, targetX: cx, targetY: cy, tolerance: q.tolerance || 1, startX, startY });
    // Update geometry state + refresh figureGroups pivots on canvas
    saveCurrentGeoState();
    document.getElementById('figure-groups-list').innerHTML = buildFigureGroupsList(q);
    wireFigureGroupDelBtns(q);
    wireFigureGroupAlignControls(q);
    geoApp.defineZones(activeZoneIds, 8, 6, 0.5);
    syncFigureGroupsToCanvas(q);
  });

  wireFigureGroupDelBtns(q);
  wireFigureGroupAlignControls(q);

  // Branche les boutons rôle et del du panneau objets de référence
  syncRefObjPanel();
}

function syncFigureGroupsToCanvas(q) {
  geoApp.clearFigureGroups();
  (q.figureGroups || []).forEach(fg => geoApp.defineFigureGroup(fg.id, fg.label, fg.objectIds, fg.pivotLabel, fg.targetZoneId, fg.targetX, fg.targetY, fg.tolerance, fg.startX, fg.startY, fg.alignConstraint, fg.mobile, fg.rotationStep));
  render();
}

function refreshFigureGroupsList(q) {
  document.getElementById('figure-groups-list').innerHTML = buildFigureGroupsList(q);
  wireFigureGroupDelBtns(q);
  wireFigureGroupAlignControls(q);
}

function wireFigureGroupDelBtns(q) {
  document.querySelectorAll('.fg-del-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      q.figureGroups = (q.figureGroups || []).filter(fg => fg.id !== this.dataset.fgid);
      refreshFigureGroupsList(q);
      saveCurrentGeoState();
      syncFigureGroupsToCanvas(q);
    });
  });

  document.querySelectorAll('.fg-mode-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const fg = (q.figureGroups || []).find(g => g.id === this.dataset.fgid);
      if (!fg) return;
      fg.mobile = fg.mobile === false ? true : false; // toggle
      refreshFigureGroupsList(q);
      scheduleSave();
      syncFigureGroupsToCanvas(q);
    });
  });

  document.querySelectorAll('.fg-align-axis').forEach(sel => {
    sel.addEventListener('change', function() {
      const fg = (q.figureGroups || []).find(g => g.id === this.dataset.fgid);
      if (!fg) return;
      if (!fg.alignConstraint) fg.alignConstraint = {};
      fg.alignConstraint.axis = this.value;
      refreshFigureGroupsList(q);
      scheduleSave();
      syncFigureGroupsToCanvas(q);
    });
  });
}

function wireFigureGroupAlignControls(q) {
  document.querySelectorAll('.fg-rotation-step').forEach(inp => {
    inp.addEventListener('input', function() {
      const fg = (q.figureGroups || []).find(g => g.id === this.dataset.fgid);
      if (fg) { fg.rotationStep = parseInt(this.value) || 90; scheduleSave(); syncFigureGroupsToCanvas(q); }
    });
  });
  document.querySelectorAll('.fg-align-ref').forEach(sel => {
    sel.addEventListener('change', function() {
      const fg = (q.figureGroups || []).find(g => g.id === this.dataset.fgid);
      if (fg) { if (!fg.alignConstraint) fg.alignConstraint = {}; fg.alignConstraint.refGroupId = this.value; scheduleSave(); syncFigureGroupsToCanvas(q); }
    });
  });
  document.querySelectorAll('.fg-align-tol').forEach(inp => {
    inp.addEventListener('input', function() {
      const fg = (q.figureGroups || []).find(g => g.id === this.dataset.fgid);
      if (fg) { if (!fg.alignConstraint) fg.alignConstraint = {}; fg.alignConstraint.tolerance = parseFloat(this.value) || 0.5; scheduleSave(); syncFigureGroupsToCanvas(q); }
    });
  });
}

// ── Canvas hint helpers ───────────────────────────
function showHint(msg) {
  const el = document.getElementById('canvas-hint');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('visible');
}
function hideHint() {
  const el = document.getElementById('canvas-hint');
  if (el) el.classList.remove('visible');
}

function buildFigureGroupsList(q) {
  if (!q || !q.figureGroups || !q.figureGroups.length) return '<div style="color:var(--text-muted);font-size:10px">Aucun groupe. Sélectionnez des objets puis cliquez "+ Grouper".</div>';
  return q.figureGroups.map(fg => {
    const ac = fg.alignConstraint || {};
    const isMobile = fg.mobile !== false; // default mobile=true
    const allOtherGroups = (q.figureGroups || []).filter(g => g.id !== fg.id);
    const refOptions = allOtherGroups.map(g => `<option value="${g.id}" ${ac.refGroupId === g.id ? 'selected' : ''}>${g.label}${g.mobile === false ? ' (fixe)' : ''}</option>`).join('');
    const axisNone = !ac.axis ? 'selected' : '';
    const axisX = ac.axis === 'x' ? 'selected' : '';
    const axisY = ac.axis === 'y' ? 'selected' : '';
    const mobileColor = isMobile ? '#89b4fa' : '#a6e3a1';
    const mobileLabel = isMobile ? 'Mobile (palette)' : 'Fixe (en place)';
    return `
    <div style="border:1px solid var(--border);border-radius:4px;margin-bottom:3px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:6px;padding:4px 6px">
        <span style="color:${mobileColor};font-weight:600">⊕</span>
        <span style="flex:1">${fg.label}</span>

function buildZoneChecks(q) {
  // Build a 3x3 grid string. Positions:
  // row0: _, top, _
  // row1: left, center, right
  // row2: _, bottom, _
  const grid = [
    [null,          'zone-top',    null        ],
    ['zone-left',   'zone-center', 'zone-right'],
    [null,          'zone-bottom', null        ]
  ];

  let html = '';
  for (const row of grid) {
    for (const zoneId of row) {
      if (!zoneId) {
        html += `<div style="aspect-ratio:1"></div>`;
      } else {
        const checked = q.activeZones.has(zoneId) ? 'checked' : '';
        html += `
          <label class="zone-check">
            <input type="checkbox" class="zone-cb" value="${zoneId}" ${checked}>
            ${ZONE_LABELS[zoneId]}
          </label>`;
      }
    }
  }
  return html;
}

function objCoordsLabel(obj) {
  if (obj.x !== undefined && obj.y !== undefined) {
    return `(${obj.x.toFixed(1)}, ${obj.y.toFixed(1)})`;
  }
  if (obj.p1id && obj.p2id) {
    const p1 = state.objects.find(o => o.id === obj.p1id);
    const p2 = state.objects.find(o => o.id === obj.p2id);
    if (p1 && p2) return `(${p1.x.toFixed(1)},${p1.y.toFixed(1)})→(${p2.x.toFixed(1)},${p2.y.toFixed(1)})`;
  }
  return obj.type || '';
}

const TYPE_GROUPS = [
  { key: 'point',   label: 'Points',    types: ['point','midpoint','intersect'] },
  { key: 'segment', label: 'Segments',  types: ['segment'] },
  { key: 'line',    label: 'Droites / Demi-droites / Vecteurs', types: ['line','ray','vector','parallel','perpendicular','perp-bisector','angle-bisector'] },
  { key: 'circle',  label: 'Cercles',   types: ['circle','circle3pts'] },
  { key: 'polygon', label: 'Polygones / Rectangles / Triangles', types: ['polygon','rect','triangle'] },
  { key: 'other',   label: 'Autres',    types: [] },
];
function getTypeGroup(type) {
  return TYPE_GROUPS.find(g => g.types.includes(type)) || TYPE_GROUPS[TYPE_GROUPS.length - 1];
}

function buildRefObjList(q) {
  const objs = getRefObjects();
  if (objs.length === 0) {
    return '<div class="empty-objects">Aucun objet — dessinez sur le canvas avec les outils.</div>';
  }
  // Group by type
  const groups = {};
  objs.forEach(obj => {
    const gk = getTypeGroup(obj.type).key;
    if (!groups[gk]) groups[gk] = [];
    groups[gk].push(obj);
  });
  let html = '';
  TYPE_GROUPS.forEach(tg => {
    const list = groups[tg.key];
    if (!list || list.length === 0) return;
    html += `<div class="ref-obj-type-header">${tg.label}</div>`;
    list.forEach(obj => {
      const role = getRole(obj.id);
      const coords = objCoordsLabel(obj);
      const isSel = _selectedObjId === obj.id;
      const dashedBadge = obj.dashed ? `<span style="font-size:9px;color:#89b4fa;margin-left:3px">- -</span>` : '';
      html += `<div class="ref-obj-item${isSel ? ' selected' : ''}" data-id="${obj.id}">
        <span style="font-weight:700;min-width:22px;font-size:11px;color:${role==='given'?'#f9e2af':'#f38ba8'}">${obj.label}${dashedBadge}</span>
        <div style="display:flex;flex-direction:column;gap:2px;flex:1">
          <div style="display:flex;gap:3px">
            <button class="role-btn ${role==='given'?'role-active':''}" data-id="${obj.id}" data-role="given" title="Donné (visible au départ)">Donné</button>
            <button class="role-btn ${role==='expected'?'role-active':''}" data-id="${obj.id}" data-role="expected" title="À tracer par l'élève">À tracer</button>
          </div>
          <span class="ref-obj-coords">${coords}</span>
        </div>
        <button class="ref-obj-del ref-obj-del-btn" data-id="${obj.id}" title="Supprimer">✕</button>
      </div>`;
    });
  });
  return html;
}

function syncRefObjPanel() {
  const listEl = document.getElementById('ref-objects-list');
  if (!listEl) return;
  const q = currentQuestion();
  listEl.innerHTML = q ? buildRefObjList(q) : '';

  listEl.querySelectorAll('.ref-obj-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      removeRefObject(parseInt(btn.dataset.id));
    });
  });

  listEl.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      setRole(parseInt(btn.dataset.id), btn.dataset.role);
    });
  });

  // Clic sur un item → sélectionner l'objet sur le canvas
  listEl.querySelectorAll('.ref-obj-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('button')) return; // ignore btn clicks
      const id = parseInt(item.dataset.id);
      const obj = state.objects.find(o => o.id === id);
      if (!obj) return;
      state.selected = [id];
      _selectedObjId = id;
      showObjProps(obj);
      render();
      syncRefObjPanel();
    });
  });

  syncQuestionList();
}

function buildExerciseData() {
  saveCurrentGeoState(); // ensure current question is saved

  const questions = exerciseData.questions.map(q => {
    // Inclure les pivots des figureGroups (labels __fg_pivot_*) même s'ils commencent par __
    const fgPivotLabels = new Set((q.figureGroups || []).map(fg => fg.pivotLabel).filter(Boolean));
    const objs = (q.geoState || []).filter(o => !o.label.startsWith('__') || fgPivotLabels.has(o.label));
    const roleMap = q.roleMap || {};

    const given    = objs.filter(o => roleMap[o.id] === 'given');
    const expected = objs.filter(o => roleMap[o.id] !== 'given');

    // Legacy: points/segments for validation (kept for compatibility)
    const givenPoints = given.filter(o => o.type === 'point' || o.type === 'midpoint').map(o => ({
      label: o.label, x: o.x, y: o.y, color: o.color || '', lineWidth: o.lineWidth ?? 2
    }));
    const givenSegments = given.filter(o => o.type === 'segment').map(o => {
      const p1 = objs.find(p => p.id === o.p1id);
      const p2 = objs.find(p => p.id === o.p2id);
      if (!p1 || !p2) return null;
      return { label: o.label, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, color: o.color || '', lineWidth: o.lineWidth ?? 2, lineStyle: o.lineStyle === 3 ? 'dashed' : 'solid' };
    }).filter(Boolean);
    const expectedPoints = expected.filter(o => o.type === 'point' || o.type === 'midpoint').map(o => ({ label: o.label, x: o.x, y: o.y }));
    const expectedSegments = expected.filter(o => o.type === 'segment').map(o => {
      const p1 = objs.find(p => p.id === o.p1id);
      const p2 = objs.find(p => p.id === o.p2id);
      if (!p1 || !p2) return null;
      return { label: o.label, x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, dashed: !!o.dashed };
    }).filter(Boolean);

    // Full geoState for direct replay + role annotations
    const givenIds = new Set(given.map(o => o.id));
    // IDs of objects that belong to any figureGroup (will be moved to palette)
    const figureGroupObjIds = new Set((q.figureGroups || []).flatMap(fg => fg.objectIds || []));

    // Annotate each object with its role directly for reliable lookup in loadQuestion
    const annotatedGeoState = objs.map(o => Object.assign({}, o, {
      _role: roleMap[o.id] === 'given' ? 'given' : 'expected'
    }));

    return {
      num: q.num,
      instructions: q.instructions,
      activeZones: [...(q.activeZones || [])],
      tolerance: q.tolerance || 0.5,
      pointsPerCorrect: q.pointsPerCorrect ?? 1,
      allowedTools: q.allowedTools || exerciseData.allowedTools || [],
      figureGroups: (q.figureGroups || []).map(fg => ({
        id: fg.id, label: fg.label,
        objectIds: fg.objectIds,
        pivotLabel: fg.pivotLabel,
        targetZoneId: fg.targetZoneId,
        targetX: fg.targetX, targetY: fg.targetY,
        tolerance: fg.tolerance || q.tolerance || 1,
        startX: fg.startX, startY: fg.startY,
        alignConstraint: fg.alignConstraint || null,
        mobile: fg.mobile !== false,
        rotationStep: fg.rotationStep != null ? fg.rotationStep : 90
      })),
      // Complete scene state: all objects + their roles embedded
      geoState: annotatedGeoState,
      givenIds: [...givenIds],
      figureGroupObjIds: [...figureGroupObjIds],
      // Legacy validation data (points/segments only)
      givenPoints, givenSegments, expectedPoints, expectedSegments
    };
  });

  const maxScore = questions.reduce((acc, q) => {
    // Count expected figureGroup member segments (À tracer in groups)
    const fgExpectedSegs = (q.figureGroups || []).reduce((n, fg) => {
      return n + (fg.objectIds || []).filter(oid => {
        const o = (q.geoState || []).find(ob => ob.id === oid);
        return o && o.type === 'segment' && o._role === 'expected';
      }).length;
    }, 0);
    return acc + (q.expectedPoints.length + q.expectedSegments.length + fgExpectedSegs) * q.pointsPerCorrect;
  }, 0);

  return {
    title: exerciseData.title || 'Exercice sans titre',
    globalInstructions: exerciseData.globalInstructions,
    imageUrl: exerciseData.imageUrl,
    totalQuestions: exerciseData.questions.length,
    maxScore,
    allowedTools: exerciseData.allowedTools || [],
    initialZoom: parseInt(document.getElementById('opt-zoom').value) || 60,
    questions
  };
}

function generateJS(data) {
  const dataJson = JSON.stringify(data, null, 2);

  return `// Exercice généré par l'Éditeur d'exercices — Géométrie
// Titre : ${data.title}
// Questions : ${data.totalQuestions}
(function() {
  'use strict';

  const EXERCISE = ${dataJson};

  let currentQIdx = 0;
  const questionScores = {}; // score par question (remplacé à chaque validation)

  function getTotalScore() {
    return Object.values(questionScores).reduce(function(a, b) { return a + b; }, 0);
  }

  // Track student-added objects for live validation
  const studentObjects = {};
  var _validateTimer = null;

  function scheduleValidate() {
    clearTimeout(_validateTimer);
    _validateTimer = setTimeout(validateQuestion, 120);
  }

  geoApp.registerAddListener(function(name) {
    if (name.startsWith('__')) return; // ignore internal objects
    studentObjects[name] = true;
    geoApp.registerObjectUpdateListener(name, function() {
      scheduleValidate();
    });
    scheduleValidate();
  });

  function dist2d(ax, ay, bx, by) {
    return Math.sqrt((bx - ax) * (bx - ax) + (by - ay) * (by - ay));
  }

  function clearStudentObjects() {
    const all = geoApp.getAllObjects();
    all.forEach(function(obj) {
      if (!obj.fixed) geoApp.deleteObject(obj.label);
    });
    for (const k in studentObjects) delete studentObjects[k];
  }

  function loadQuestion(idx) {
    const q = EXERCISE.questions[idx];
    if (!q) return;

    geoApp.setExerciseMode(true);
    questionScores[idx] = 0;
    for (const k in studentObjects) delete studentObjects[k];
    geoApp.setQuestion(q.num, EXERCISE.totalQuestions);
    geoApp.setInstructions(q.instructions || EXERCISE.globalInstructions);

    // ── Charger le geoState complet (tous les objets dessinés par le prof) ──
    if (q.geoState && q.geoState.length > 0) {
      var givenIdSet = new Set(q.givenIds || []);
      // Étendre givenIdSet : les points constitutifs d'un objet "donné" sont aussi donnés
      // (un segment donné implique que ses points sont visibles)
      var givenChanged = true;
      while (givenChanged) {
        givenChanged = false;
        q.geoState.forEach(function(o) {
          var oIsGiven = o._role === 'given' || (o._role === undefined && givenIdSet.has(o.id));
          if (!oIsGiven) return;
          [o.p1id, o.p2id, o.centerId, o.pointId, o.radiusPointId].forEach(function(pid) {
            if (pid != null && !givenIdSet.has(pid)) { givenIdSet.add(pid); givenChanged = true; }
          });
          if (Array.isArray(o.pointIds)) o.pointIds.forEach(function(pid) {
            if (!givenIdSet.has(pid)) { givenIdSet.add(pid); givenChanged = true; }
          });
        });
      }
      // Séparer groupes mobiles (palette) et fixes (restent en place)
      var mobileFgs = (q.figureGroups || []).filter(function(fg) { return fg.mobile !== false; });
      var fixedFgs  = (q.figureGroups || []).filter(function(fg) { return fg.mobile === false; });
      var fgObjIdSet = new Set((q.figureGroupObjIds || []).filter(function(id) {
        // Garder uniquement les objets des groupes mobiles dans fgObjIdSet
        return mobileFgs.some(function(fg) { return (fg.objectIds || []).includes(id); });
      }));
      var fixedFgObjIdSet = new Set();
      fixedFgs.forEach(function(fg) { (fg.objectIds || []).forEach(function(id) { fixedFgObjIdSet.add(id); }); });

      // Inclure les pivots mobiles (points __fg_pivot_*) dans le set DnD
      mobileFgs.forEach(function(fg) {
        var pivot = q.geoState.find(function(o) { return o.label === fg.pivotLabel; });
        if (pivot) fgObjIdSet.add(pivot.id);
      });

      // Étend fgObjIdSet dans les deux sens :
      // 1. Objets membres → leurs points constitutifs
      // 2. Objets quelconques dont TOUS les points constitutifs sont dans le set → inclure l'objet
      var changed = true;
      while (changed) {
        changed = false;
        q.geoState.forEach(function(o) {
          // Direction 1 : objet membre → ses points constitutifs
          if (fgObjIdSet.has(o.id)) {
            [o.p1id, o.p2id, o.centerId, o.pointId].forEach(function(pid) {
              if (pid != null && !fgObjIdSet.has(pid)) { fgObjIdSet.add(pid); changed = true; }
            });
            if (Array.isArray(o.pointIds)) o.pointIds.forEach(function(pid) {
              if (!fgObjIdSet.has(pid)) { fgObjIdSet.add(pid); changed = true; }
            });
          }
          // Direction 2 : objet dont les constituants sont tous dans le set → inclure l'objet
          if (!fgObjIdSet.has(o.id)) {
            var refs = [o.p1id, o.p2id, o.centerId, o.pointId].filter(function(x) { return x != null; });
            if (Array.isArray(o.pointIds)) refs = refs.concat(o.pointIds);
            if (refs.length > 0 && refs.every(function(pid) { return fgObjIdSet.has(pid); })) {
              fgObjIdSet.add(o.id); changed = true;
            }
          }
        });
      }

      // Set des pivots mobiles uniquement (drag handles)
      var pivotIds = new Set();
      mobileFgs.forEach(function(fg) {
        var pivot = q.geoState.find(function(o) { return o.label === fg.pivotLabel; });
        if (pivot) pivotIds.add(pivot.id);
      });
      // Pivots fixes : on les ignore (pas de handle visible)
      var fixedPivotIds = new Set();
      fixedFgs.forEach(function(fg) {
        var pivot = q.geoState.find(function(o) { return o.label === fg.pivotLabel; });
        if (pivot) fixedPivotIds.add(pivot.id);
      });

      // Clone : fixe les "donnés", masque les "à tracer" hors DnD,
      // fixe les membres DnD (sauf pivots mobiles) pour qu'ils ne bougent que via le pivot
      // Les groupes fixes : membres visibles + fixes, pas de pivot visible
      var stateToLoad = q.geoState.map(function(o) {
        var clone = JSON.parse(JSON.stringify(o));
        // Use embedded _role when available, fall back to givenIdSet for backwards compatibility
        var isGiven = o._role === 'given' || (o._role === undefined && givenIdSet.has(o.id));
        if (fixedPivotIds.has(o.id)) {
          clone.visible = false; // pivot groupe fixe : caché
          clone.fixed = true;
        } else if (fixedFgObjIdSet.has(o.id)) {
          clone.fixed = true;
          if (!isGiven) clone.visible = false; // "à tracer" dans groupe fixe : caché
        } else if (isGiven) {
          clone.fixed = true;   // donné : fixe, visible selon config admin (obj.visible)
        } else if (pivotIds.has(o.id)) {
          clone.fixed = false;  // pivot mobile : déplaçable (drag handle)
          clone.visible = false; // invisible mais actif
        } else if (fgObjIdSet.has(o.id)) {
          clone.fixed = true;
          if (!isGiven) clone.visible = false; // "à tracer" dans groupe mobile : caché mais bougera avec pivot
        } else {
          clone.visible = false; // "à tracer" hors DnD : caché
        }
        return clone;
      });
      geoApp.loadGeoState(stateToLoad);
    } else {
      geoApp.loadGeoState([]);
    }

    // Zones orthographiques
    geoApp.clearFigureGroups();
    if (q.activeZones && q.activeZones.length > 0) {
      geoApp.defineZones(q.activeZones, 8, 6, 0.5);
    } else {
      geoApp.hideZones();
    }

    // Figures déplaçables
    if (q.figureGroups && q.figureGroups.length > 0) {
      q.figureGroups.forEach(function(fg) {
        geoApp.defineFigureGroup(fg.id, fg.label, fg.objectIds, fg.pivotLabel, fg.targetZoneId, fg.targetX, fg.targetY, fg.tolerance, fg.startX, fg.startY, fg.alignConstraint, fg.mobile);
      });
      geoApp.resetAllGroupsToStart();
      geoApp.onGroupMoved(function(groupId, zoneId, x, y) {
        scheduleValidate();
      });
    }
  }

  function validateQuestion() {
    const q = EXERCISE.questions[currentQIdx];
    if (!q) return 0;

    // IDs des objets DnD + leurs points constitutifs (expansion bidirectionnelle)
    var fgObjIds = new Set((q.figureGroups || []).flatMap(function(fg) { return fg.objectIds || []; }));
    // Ajouter aussi les pivots
    if (q.figureGroups) q.figureGroups.forEach(function(fg) {
      var pivot = (q.geoState || []).find(function(o) { return o.label === fg.pivotLabel; });
      if (pivot) fgObjIds.add(pivot.id);
    });
    // Expansion : objets → points constitutifs et points → objets parents
    var changed = true;
    while (changed) {
      changed = false;
      (q.geoState || []).forEach(function(o) {
        if (fgObjIds.has(o.id)) {
          [o.p1id, o.p2id, o.centerId, o.pointId].forEach(function(pid) {
            if (pid != null && !fgObjIds.has(pid)) { fgObjIds.add(pid); changed = true; }
          });
          if (Array.isArray(o.pointIds)) o.pointIds.forEach(function(pid) {
            if (!fgObjIds.has(pid)) { fgObjIds.add(pid); changed = true; }
          });
        } else {
          var refs = [o.p1id, o.p2id, o.centerId, o.pointId].filter(function(x) { return x != null; });
          if (Array.isArray(o.pointIds)) refs = refs.concat(o.pointIds);
          if (refs.length > 0 && refs.every(function(pid) { return fgObjIds.has(pid); })) {
            fgObjIds.add(o.id); changed = true;
          }
        }
      });
    }

    const all = geoApp.getAllObjects();
    // Objets élève : ni fixés, ni internes, ni membres d'un figureGroup
    const studentPts = all.filter(function(o) {
      return (o.type === 'point' || o.type === 'midpoint')
        && !o.fixed && !o.label.startsWith('__') && !fgObjIds.has(o.id);
    });
    const studentSegs = all.filter(function(o) {
      return o.type === 'segment' && !o.fixed && !o.label.startsWith('__') && !fgObjIds.has(o.id);
    });

    const tol = q.tolerance || 0.5;
    const ppc = q.pointsPerCorrect != null ? q.pointsPerCorrect : 1;
    let gained = 0;

    // ── Vérification points attendus ──────────────────
    (q.expectedPoints || []).forEach(function(ref) {
      var best = null, bestD = Infinity;
      studentPts.forEach(function(s) {
        var d = dist2d(s.x, s.y, ref.x, ref.y);
        if (d < bestD) { bestD = d; best = s; }
      });
      if (best && bestD <= tol) {
        geoApp.setColor(best.label, 166, 227, 161); // vert
        gained += ppc;
      } else if (best) {
        geoApp.setColor(best.label, 243, 139, 168); // rouge
      }
    });

    // ── Vérification segments attendus ────────────────
    var usedStudentSegs = {};
    (q.expectedSegments || []).forEach(function(ref) {
      var best = null, bestScore = -1;
      studentSegs.forEach(function(s) {
        if (usedStudentSegs[s.label]) return;
        if (!s.p1 || !s.p2) return;
        var fwd = dist2d(s.p1.x,s.p1.y,ref.x1,ref.y1) + dist2d(s.p2.x,s.p2.y,ref.x2,ref.y2);
        var rev = dist2d(s.p1.x,s.p1.y,ref.x2,ref.y2) + dist2d(s.p2.x,s.p2.y,ref.x1,ref.y1);
        var sc = -Math.min(fwd, rev);
        if (sc > bestScore) { bestScore = sc; best = s; }
      });
      if (!best) return;
      var fwd = dist2d(best.p1.x,best.p1.y,ref.x1,ref.y1) <= tol && dist2d(best.p2.x,best.p2.y,ref.x2,ref.y2) <= tol;
      var rev = dist2d(best.p1.x,best.p1.y,ref.x2,ref.y2) <= tol && dist2d(best.p2.x,best.p2.y,ref.x1,ref.y1) <= tol;
      if (fwd || rev) {
        // Vérifier aussi le style de trait (plein vs pointillé)
        var studentObj = geoApp.getAllObjects().find(function(o) { return o.label === best.label; });
        var styleOk = ref.dashed === undefined || !studentObj || (!!studentObj.dashed === !!ref.dashed);
        if (styleOk) {
          geoApp.setColor(best.label, 166, 227, 161); // vert
          gained += ppc;
          usedStudentSegs[best.label] = true;
        } else {
          geoApp.setColor(best.label, 250, 179, 135); // orange : position ok, style incorrect
        }
      } else {
        geoApp.setColor(best.label, 243, 139, 168); // rouge
      }
    });

    // ── Vérification des segments "À tracer" dans les groupes ───
    // Les segments masqués membres d'un groupe sont validés quand le groupe est dans la bonne zone
    if (q.figureGroups && q.figureGroups.length > 0) {
      var allObjs = geoApp.getAllObjects();
      q.figureGroups.forEach(function(fg) {
        var currentZone = geoApp.getFigureGroupCurrentZone ? geoApp.getFigureGroupCurrentZone(fg.id) : null;
        var inTarget = currentZone != null && fg.targetZoneId != null && currentZone === fg.targetZoneId;
        if (!inTarget) return; // groupe pas en bonne zone : pas de validation des À tracer
        var fgObjIdsFull = new Set(fg.objectIds || []);
        // Segments cachés (à tracer) du groupe : leurs positions actuelles = positions attendues
        var hiddenGroupSegs = allObjs.filter(function(o) {
          return o.type === 'segment' && !o.visible && fgObjIdsFull.has(o.id) && o.p1 && o.p2;
        });
        hiddenGroupSegs.forEach(function(ref) {
          var best = null, bestScore = -1;
          studentSegs.forEach(function(s) {
            if (usedStudentSegs[s.label]) return;
            if (!s.p1 || !s.p2) return;
            var fwd = dist2d(s.p1.x,s.p1.y,ref.p1.x,ref.p1.y) + dist2d(s.p2.x,s.p2.y,ref.p2.x,ref.p2.y);
            var rev = dist2d(s.p1.x,s.p1.y,ref.p2.x,ref.p2.y) + dist2d(s.p2.x,s.p2.y,ref.p1.x,ref.p1.y);
            var sc = -Math.min(fwd, rev);
            if (sc > bestScore) { bestScore = sc; best = s; }
          });
          if (!best) return;
          var fwd = dist2d(best.p1.x,best.p1.y,ref.p1.x,ref.p1.y) <= tol && dist2d(best.p2.x,best.p2.y,ref.p2.x,ref.p2.y) <= tol;
          var rev = dist2d(best.p1.x,best.p1.y,ref.p2.x,ref.p2.y) <= tol && dist2d(best.p2.x,best.p2.y,ref.p1.x,ref.p1.y) <= tol;
          if (fwd || rev) {
            var styleOk = !ref.dashed || (!!geoApp.getAllObjects().find(function(o){ return o.label===best.label; }) && !!geoApp.getAllObjects().find(function(o){ return o.label===best.label; }).dashed === !!ref.dashed);
            if (styleOk) {
              geoApp.setColor(best.label, 166, 227, 161); // vert
              gained += ppc;
              usedStudentSegs[best.label] = true;
            } else {
              geoApp.setColor(best.label, 250, 179, 135); // orange: style incorrect
            }
          } else {
            geoApp.setColor(best.label, 243, 139, 168); // rouge
          }
        });
      });
    }

    questionScores[currentQIdx] = gained;
    var total = getTotalScore();
    geoApp.updateScore(total.toFixed(1), EXERCISE.maxScore != null ? EXERCISE.maxScore.toFixed(1) : '?');

    // Ne pas écraser les états de zones gérés par le DnD (green/yellow)
    // Colorier les zones uniquement si l'exercice n'a PAS de figureGroups
    const hasDnD = q.figureGroups && q.figureGroups.length > 0;
    if (!hasDnD && q.activeZones && q.activeZones.length > 0) {
      const totalExpected = (q.expectedPoints||[]).length + (q.expectedSegments||[]).length;
      const allCorrect = totalExpected === 0 || gained >= totalExpected * ppc;
      q.activeZones.forEach(function(z) {
        geoApp.setZoneState(z, allCorrect ? 'correct' : 'error');
      });
    }

    return gained;
  }

  // ── Register callbacks ────────────────────────────
  geoVars['__onValidate'] = function() {
    validateQuestion();
  };

  geoVars['__onNext'] = function() {
    if (currentQIdx < EXERCISE.questions.length - 1) {
      currentQIdx++;
      loadQuestion(currentQIdx);
    }
  };

  geoVars['__onReset'] = function() {
    currentQIdx = 0;
    for (var k in questionScores) delete questionScores[k];
    loadQuestion(0);
    geoApp.updateScore('0', EXERCISE.maxScore != null ? EXERCISE.maxScore.toFixed(1) : '?');
    geoApp.clearFigureGroups();
  };

  // ── Initial setup ─────────────────────────────────
  if (EXERCISE.allowedTools && EXERCISE.allowedTools.length > 0 && geoApp.setAvailableTools) {
    geoApp.setAvailableTools(EXERCISE.allowedTools);
  }
  geoApp.setupExercise({
    title: EXERCISE.title,
    instructions: EXERCISE.questions.length > 0 ? EXERCISE.questions[0].instructions : EXERCISE.globalInstructions,
    imageUrl: EXERCISE.imageUrl,
    totalQuestions: EXERCISE.totalQuestions,
    maxScore: EXERCISE.maxScore
  });
  geoApp.updateScore('0', EXERCISE.maxScore != null ? EXERCISE.maxScore.toFixed(1) : '?');

  if (EXERCISE.initialZoom) {
    geoApp.evalCommand('ZoomIn');
  }

  if (EXERCISE.questions.length > 0) {
    loadQuestion(0);
  }

})();
`;
}

// SAUVEGARDE AUTOMATIQUE (localStorage)
// ══════════════════════════════════════════════════════

const STORAGE_KEY = 'geoapp_editeur_v1';

function serializeState() {
  saveCurrentGeoState();
  return {
    title: exerciseData.title,
    globalInstructions: exerciseData.globalInstructions,
    imageUrl: exerciseData.imageUrl,
    allowedTools: exerciseData.allowedTools || [],
    refColor: document.getElementById('opt-ref-color').value,
    gridUnit: document.getElementById('opt-grid').value,
    initialZoom: document.getElementById('opt-zoom').value,
    questions: exerciseData.questions.map(q => ({
      id: q.id,
      num: q.num,
      instructions: q.instructions,
      activeZones: [...q.activeZones],
      tolerance: q.tolerance,
      pointsPerCorrect: q.pointsPerCorrect ?? 1,
      geoState: q.geoState || [],
      roleMap: q.roleMap || {},
      figureGroups: q.figureGroups || []
    })),
    currentQuestionId,
    nextObjId
  };
}

function deserializeState(data) {
  exerciseData.title = data.title || '';
  exerciseData.globalInstructions = data.globalInstructions || '';
  exerciseData.imageUrl = data.imageUrl || '';

  document.getElementById('ex-title').value = exerciseData.title;
  document.getElementById('ex-global-instructions').value = exerciseData.globalInstructions;
  document.getElementById('ex-image-url').value = exerciseData.imageUrl;
  exerciseData.allowedTools = data.allowedTools || [];
  if (data.refColor) document.getElementById('opt-ref-color').value = data.refColor;
  if (data.gridUnit) document.getElementById('opt-grid').value = data.gridUnit;
  if (data.initialZoom) document.getElementById('opt-zoom').value = data.initialZoom;

  if (exerciseData.imageUrl) {
    const img = document.getElementById('ex-image-preview');
    img.src = exerciseData.imageUrl;
    img.style.display = 'block';
  }

  if (data.nextObjId) nextObjId = data.nextObjId;

  exerciseData.questions = (data.questions || []).map(q => ({
    id: q.id,
    num: q.num,
    instructions: q.instructions || '',
    activeZones: new Set(q.activeZones || ['zone-center']),
    tolerance: q.tolerance || 0.5,
    pointsPerCorrect: q.pointsPerCorrect ?? 1,
    geoState: q.geoState || [],
    roleMap: q.roleMap || {},
    figureGroups: q.figureGroups || []
  }));

  questionCounter = exerciseData.questions.length;

  // Ensure geometry.js id counter is ahead of restored object ids
  let maxId = 0;
  exerciseData.questions.forEach(q => (q.geoState || []).forEach(o => { if (o.id > maxId) maxId = o.id; }));
  if (typeof nextId !== 'undefined' && maxId >= nextId) nextId = maxId + 1;

  if (exerciseData.questions.length > 0) {
    const targetId = data.currentQuestionId || exerciseData.questions[0].id;
    currentQuestionId = null; // prevent saveCurrentGeoState from clobbering
    selectQuestion(targetId);
  }

  syncQuestionList();
  syncTotalQuestions();
  initStudentToolsPanel();
  render();
}

let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(serializeState()));
      const el = document.getElementById('autosave-status');
      if (el) {
        el.textContent = '✔ Sauvegardé ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        el.style.color = 'var(--success)';
        setTimeout(() => { el.style.color = 'var(--text-muted)'; }, 2000);
      }
    } catch(e) { console.warn('Autosave failed', e); }
  }, 800);
}

// Déclencher la sauvegarde sur toutes les modifications
document.addEventListener('input', scheduleSave);
const _origAddQ = addQuestion;
// Patch des fonctions qui modifient l'état
const _patchSave = fn => function(...args) { const r = fn(...args); scheduleSave(); return r; };
// On surveille les actions clés via MutationObserver sur la liste de questions
new MutationObserver(scheduleSave).observe(
  document.getElementById('questions-list'), { childList: true, subtree: true }
);

// ── Raccourci pavé numérique "." → focus objet sélectionné dans la liste de référence ──
document.addEventListener('keydown', function(e) {
  if (e.code === 'NumpadDecimal') {
    e.preventDefault();
    // Trouve l'objet sélectionné (canvas ou panneau)
    const selId = (state.selected && state.selected.length) ? state.selected[0] : _selectedObjId;
    if (selId == null) return;
    // Scroll jusqu'à l'item dans ref-objects-list
    const listEl = document.getElementById('ref-objects-list');
    if (!listEl) return;
    const item = listEl.querySelector('[data-id="' + selId + '"]');
    if (item) {
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      // Bref highlight
      item.style.outline = '2px solid #89b4fa';
      setTimeout(() => { item.style.outline = ''; }, 800);
    }
  }
});

// ── Collapsible sections ──────────────────────────
(function() {
  function makeCollapsible(toggleId, bodyId, chevronEl) {
    const btn = document.getElementById(toggleId);
    const body = document.getElementById(bodyId);
    const chevron = chevronEl || btn.querySelector('.collapsible-toggle');
    if (!btn || !body) return;
    btn.addEventListener('click', function(e) {
      if (e.target.id === 'obj-props-close') return; // don't collapse on close btn
      const isOpen = !body.classList.contains('collapsed');
      body.classList.toggle('collapsed', isOpen);
      if (chevron) chevron.classList.toggle('open', !isOpen);
    });
  }
  makeCollapsible('toggle-palette', 'palette-body');
  makeCollapsible('toggle-props', 'props-body', document.getElementById('props-chevron'));

  // Left panel collapsibles
  document.querySelectorAll('.left-panel-toggle').forEach(function(h3) {
    const bodyId = h3.getAttribute('data-target');
    const body = document.getElementById(bodyId);
    const chevron = h3.querySelector('.left-chevron');
    if (!body) return;
    body.style.maxHeight = body.scrollHeight + 'px';
    h3.addEventListener('click', function() {
      const isOpen = !body.classList.contains('collapsed');
      body.classList.toggle('collapsed', isOpen);
      if (isOpen) body.style.maxHeight = '0';
      else body.style.maxHeight = body.scrollHeight + 'px';
      if (chevron) chevron.classList.toggle('collapsed', isOpen);
    });
  });
})();

function initStudentToolsPanel() {
  const grid = document.getElementById('student-tools-grid');
  if (!grid) return;
  grid.innerHTML = '';
  ALL_TOOLS.forEach(t => {
    const cb = document.createElement('label');
    cb.style.cssText = 'display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;background:var(--surface2);padding:3px 8px;border-radius:4px;border:1px solid var(--border)';
    const checked = !exerciseData.allowedTools || exerciseData.allowedTools.length === 0 || exerciseData.allowedTools.includes(t.key);
    cb.innerHTML = `<input type="checkbox" data-stool="${t.key}" ${checked ? 'checked' : ''}> ${t.label}`;
    grid.appendChild(cb);
  });
  grid.querySelectorAll('input[data-stool]').forEach(inp => {
    inp.addEventListener('change', () => {
      exerciseData.allowedTools = [...grid.querySelectorAll('input[data-stool]:checked')].map(i => i.dataset.stool);
      scheduleSave();
    });
  });
}
