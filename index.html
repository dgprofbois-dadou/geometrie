<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Géométrie Interactive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Barre d'outils principale -->
    <div id="toolbar">
      <div class="tool-group" id="group-select">
        <button class="tool-btn active" data-tool="select" title="Sélectionner / Déplacer (S)">
          <svg viewBox="0 0 24 24"><path d="M4 2l16 9-7 2-3 7z"/></svg>
          <span>Sélectionner</span>
        </button>
        <button class="tool-btn" data-tool="lasso" title="Sélection par lasso (ou Shift+glisser en mode Sélect.)">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Lasso</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group">
        <button class="tool-btn" id="btn-join-group" title="Joindre la sélection en groupe">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="13" y="3" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><rect x="8" y="13" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><line x1="7" y1="11" x2="12" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="17" y1="11" x2="12" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Joindre</span>
        </button>
        <button class="tool-btn" id="btn-explode-group" title="Éclater le groupe">
          <svg viewBox="0 0 24 24"><rect x="8" y="8" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="8" x2="4" y2="3" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="8" x2="20" y2="3" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="16" x2="8" y2="21" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="16" x2="16" y2="21" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Éclater</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-point">
        <button class="tool-btn" data-tool="point" title="Point (P)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
          <span>Point</span>
        </button>
        <button class="tool-btn" data-tool="point-on-object" title="Point sur objet">
          <svg viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
          <span>Pt. sur objet</span>
        </button>
        <button class="tool-btn" data-tool="midpoint" title="Milieu (M)">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="12" r="3" fill="currentColor"/><circle cx="20" cy="12" r="3" fill="currentColor"/><circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/><line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/></svg>
          <span>Milieu</span>
        </button>
        <button class="tool-btn" data-tool="intersect" title="Intersection">
          <svg viewBox="0 0 24 24"><line x1="2" y1="4" x2="22" y2="20" stroke="currentColor" stroke-width="2"/><line x1="2" y1="20" x2="22" y2="4" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="white" stroke="currentColor" stroke-width="2"/></svg>
          <span>Intersection</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-line">
        <button class="tool-btn" data-tool="segment" title="Segment (G)">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="20" r="3" fill="currentColor"/><circle cx="20" cy="4" r="3" fill="currentColor"/><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2"/></svg>
          <span>Segment</span>
        </button>
        <button class="tool-btn" data-tool="line" title="Droite (D)">
          <svg viewBox="0 0 24 24"><circle cx="7" cy="17" r="2.5" fill="currentColor"/><circle cx="17" cy="7" r="2.5" fill="currentColor"/><line x1="2" y1="22" x2="22" y2="2" stroke="currentColor" stroke-width="2"/></svg>
          <span>Droite</span>
        </button>
        <button class="tool-btn" data-tool="ray" title="Demi-droite">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="20" r="2.5" fill="currentColor"/><line x1="4" y1="20" x2="22" y2="2" stroke="currentColor" stroke-width="2"/><polygon points="20,4 22,2 24,6" fill="currentColor"/></svg>
          <span>Demi-droite</span>
        </button>
        <button class="tool-btn" data-tool="vector" title="Vecteur">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="20" r="2.5" fill="currentColor"/><line x1="4" y1="20" x2="19" y2="5" stroke="currentColor" stroke-width="2"/><polygon points="19,5 15,7 17,11" fill="currentColor"/></svg>
          <span>Vecteur</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-special-line">
        <button class="tool-btn" data-tool="parallel" title="Droite parallèle">
          <svg viewBox="0 0 24 24"><line x1="2" y1="8" x2="22" y2="8" stroke="currentColor" stroke-width="2"/><line x1="2" y1="16" x2="22" y2="16" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="16" r="2.5" fill="currentColor"/></svg>
          <span>Parallèle</span>
        </button>
        <button class="tool-btn" data-tool="perpendicular" title="Droite perpendiculaire">
          <svg viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/><line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="12" r="2.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Perpendiculaire</span>
        </button>
        <button class="tool-btn" data-tool="perp-bisector" title="Médiatrice">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="20" r="2.5" fill="currentColor"/><circle cx="20" cy="20" r="2.5" fill="currentColor"/><line x1="4" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="2"/><line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-dasharray="4,2"/><circle cx="12" cy="20" r="2" fill="white" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Médiatrice</span>
        </button>
        <button class="tool-btn" data-tool="angle-bisector" title="Bissectrice">
          <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="2" y2="4" stroke="currentColor" stroke-width="2"/><line x1="12" y1="20" x2="22" y2="4" stroke="currentColor" stroke-width="2"/><line x1="12" y1="20" x2="12" y2="4" stroke="currentColor" stroke-width="2" stroke-dasharray="3,2"/></svg>
          <span>Bissectrice</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-polygon">
        <button class="tool-btn" data-tool="polygon" title="Polygone">
          <svg viewBox="0 0 24 24"><polygon points="12,3 21,9 18,20 6,20 3,9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Polygone</span>
        </button>
        <button class="tool-btn" data-tool="triangle" title="Triangle">
          <svg viewBox="0 0 24 24"><polygon points="12,3 22,21 2,21" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Triangle</span>
        </button>
        <button class="tool-btn" data-tool="rectangle" title="Rectangle">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Rectangle</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-circle">
        <button class="tool-btn" data-tool="circle-center-point" title="Cercle (centre + point) (C)">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/><circle cx="21" cy="12" r="2.5" fill="currentColor"/></svg>
          <span>Cercle</span>
        </button>
        <button class="tool-btn" data-tool="circle-3points" title="Cercle par 3 points">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="3" r="2" fill="currentColor"/><circle cx="20" cy="16" r="2" fill="currentColor"/><circle cx="4" cy="16" r="2" fill="currentColor"/></svg>
          <span>Cercle 3pts</span>
        </button>
        <button class="tool-btn" data-tool="semicircle" title="Demi-cercle">
          <svg viewBox="0 0 24 24"><path d="M4,16 A10,10 0 0,1 20,16" fill="none" stroke="currentColor" stroke-width="2"/><line x1="4" y1="16" x2="20" y2="16" stroke="currentColor" stroke-width="2"/><circle cx="4" cy="16" r="2.5" fill="currentColor"/><circle cx="20" cy="16" r="2.5" fill="currentColor"/></svg>
          <span>Demi-cercle</span>
        </button>
        <button class="tool-btn" data-tool="arc" title="Arc de cercle">
          <svg viewBox="0 0 24 24"><path d="M4,20 A12,12 0 0,1 20,4" fill="none" stroke="currentColor" stroke-width="2.5"/><circle cx="4" cy="20" r="2.5" fill="currentColor"/><circle cx="20" cy="4" r="2.5" fill="currentColor"/><circle cx="4" cy="4" r="2.5" fill="currentColor"/></svg>
          <span>Arc</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-measure">
        <button class="tool-btn" data-tool="angle" title="Angle">
          <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="2"/><line x1="4" y1="20" x2="16" y2="6" stroke="currentColor" stroke-width="2"/><path d="M8,20 A8,8 0 0,0 10,14" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Angle</span>
        </button>
        <button class="tool-btn" data-tool="distance" title="Distance / Longueur">
          <svg viewBox="0 0 24 24"><circle cx="4" cy="12" r="2.5" fill="currentColor"/><circle cx="20" cy="12" r="2.5" fill="currentColor"/><line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2"/><line x1="4" y1="8" x2="4" y2="16" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="8" x2="20" y2="16" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Distance</span>
        </button>
        <button class="tool-btn" data-tool="area" title="Aire">
          <svg viewBox="0 0 24 24"><polygon points="12,3 21,9 18,20 6,20 3,9" fill="rgba(100,150,255,0.3)" stroke="currentColor" stroke-width="2"/><text x="12" y="14" text-anchor="middle" font-size="8" fill="currentColor">A</text></svg>
          <span>Aire</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-transform">
        <button class="tool-btn" data-tool="reflect-line" title="Symétrie axiale">
          <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-dasharray="4,2"/><polygon points="3,5 9,8 6,12 3,5" fill="none" stroke="currentColor" stroke-width="1.5"/><polygon points="21,5 15,8 18,12 21,5" fill="currentColor" opacity="0.5"/></svg>
          <span>Sym. axiale</span>
        </button>
        <button class="tool-btn" data-tool="reflect-point" title="Symétrie centrale">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5" fill="currentColor"/><polygon points="4,4 8,4 8,8 4,4" fill="none" stroke="currentColor" stroke-width="1.5"/><polygon points="16,16 20,20 16,20 16,16" fill="currentColor" opacity="0.5"/></svg>
          <span>Sym. centrale</span>
        </button>
        <button class="tool-btn" data-tool="rotate" title="Rotation">
          <svg viewBox="0 0 24 24"><path d="M12,4 A8,8 0 0,1 20,12" fill="none" stroke="currentColor" stroke-width="2"/><polygon points="20,8 20,14 16,11" fill="currentColor"/><polygon points="4,4 8,4 8,8 4,4" fill="none" stroke="currentColor" stroke-width="1.5"/><polygon points="10,16 14,14 15,18 10,16" fill="currentColor" opacity="0.5"/></svg>
          <span>Rotation</span>
        </button>
        <button class="tool-btn" data-tool="translate" title="Translation">
          <svg viewBox="0 0 24 24"><polygon points="3,8 9,8 9,14 3,8" fill="none" stroke="currentColor" stroke-width="1.5"/><polygon points="13,10 19,10 19,16 13,10" fill="currentColor" opacity="0.5"/><line x1="6" y1="8" x2="13" y2="10" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/></svg>
          <span>Translation</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-text">
        <button class="tool-btn" data-tool="text" title="Texte">
          <svg viewBox="0 0 24 24"><text x="4" y="19" font-size="18" font-weight="bold" fill="currentColor">T</text></svg>
          <span>Texte</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" id="group-delete">
        <button class="tool-btn" data-tool="delete" title="Supprimer (Del)">
          <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19,6l-1,14H6L5,6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="9" y1="11" x2="9" y2="17" stroke="currentColor" stroke-width="2"/><line x1="15" y1="11" x2="15" y2="17" stroke="currentColor" stroke-width="2"/></svg>
          <span>Supprimer</span>
        </button>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group" style="flex-direction:row;align-items:center;gap:4px">
        <button id="btn-snap" title="Aimantation grille (actif/inactif)" class="tool-btn active" style="min-width:36px;font-size:16px">⊹</button>
        <select id="snap-unit" title="Unité d'aimantation" style="font-size:11px;padding:2px 4px;background:var(--surface2,#2a2a3e);color:var(--text,#cdd6f4);border:1px solid var(--border,#3f3f5a);border-radius:4px;cursor:pointer;height:28px">
          <option value="0.25">¼ u.</option>
          <option value="0.5">½ u.</option>
          <option value="1" selected>1 u.</option>
          <option value="2">2 u.</option>
          <option value="5">5 u.</option>
        </select>
      </div>

      <div class="tool-separator"></div>

      <div class="tool-group">
        <a href="editeur-exercice.html" class="tool-btn" style="text-decoration:none" title="Créer un exercice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
          <span>Éditeur</span>
        </a>
      </div>
    </div>

    <!-- Zone principale -->
    <div id="main-area">
      <!-- Panneau gauche (onglets Objets / Exercice) -->
      <div id="algebra-panel">
        <div id="algebra-header">
          <div id="left-tabs">
            <button class="left-tab active" data-tab="objects">Objets</button>
            <button class="left-tab" data-tab="exercise">Exercice</button>
          </div>
          <button id="toggle-algebra" title="Masquer le panneau">◀</button>
        </div>

        <!-- Onglet Objets -->
        <div id="tab-objects" class="tab-content active">
          <div id="algebra-list"></div>
        </div>

        <!-- Onglet Exercice -->
        <div id="tab-exercise" class="tab-content" style="display:none">
          <div id="ex-left-toolbar">
            <label id="ex-left-load-btn" title="Charger un fichier .js">
              📂 Charger .js
              <input type="file" id="ex-left-file-input" accept=".js" style="display:none">
            </label>
            <a href="editeur-exercice.html" target="_blank" id="ex-editor-link" title="Ouvrir l'éditeur d'exercices">✏️ Éditeur</a>
          </div>
          <div id="ex-code-area">
            <textarea id="ex-code-editor" spellcheck="false" placeholder="// Collez ou écrivez ici le code d'un exercice&#10;// puis cliquez sur Exécuter.&#10;&#10;// Exemple :&#10;// geoApp.setupExercise({&#10;//   title: 'Mon exercice',&#10;//   instructions: 'Tracez un segment.',&#10;//   totalQuestions: 1&#10;// });"></textarea>
          </div>
          <div id="ex-code-btns">
            <button id="ex-btn-run">▶ Exécuter</button>
            <button id="ex-btn-clear-code">✕ Vider</button>
          </div>
          <div id="ex-code-log"></div>
        </div>
      </div>

      <!-- Canvas principal -->
      <div id="canvas-container">
        <canvas id="geo-canvas"></canvas>

        <!-- Coordonnées sous la souris -->
        <div id="coords-display">x = 0, y = 0</div>

        <!-- Barre d'état -->
        <div id="status-bar">
          <span id="status-message">Sélectionner un outil pour commencer</span>
          <div id="status-right">
            <button id="btn-zoom-in" title="Zoom avant (+)">+</button>
            <span id="zoom-level">100%</span>
            <button id="btn-zoom-out" title="Zoom arrière (-)">−</button>
            <button id="btn-zoom-fit" title="Ajuster la vue (F)">⊡</button>
            <button id="btn-grid" title="Grille (Ctrl+G)" class="active">⊞</button>
            <button id="btn-axes" title="Axes (Ctrl+A)" class="active">⊕</button>
          </div>
        </div>

        <!-- Boutons undo/redo/clear -->
        <div id="action-btns">
          <button id="btn-undo" title="Annuler (Ctrl+Z)" disabled>↩</button>
          <button id="btn-redo" title="Rétablir (Ctrl+Y)" disabled>↪</button>
          <button id="btn-clear" title="Tout effacer">🗑</button>
          <button id="btn-export" title="Exporter PNG">⬇</button>
        </div>
      </div>

    <!-- Panneau exercice (côté droit, dans main-area flex row) -->
    <div id="exercise-panel" class="hidden">
      <div id="ex-header">
        <span id="ex-title">Exercice</span>
        <div id="ex-meta">
          <span id="ex-question-num">-</span>
          <span id="ex-score-label">Score :</span>
          <span id="ex-score">0 / 0</span>
        </div>
        <label id="ex-load-btn" title="Charger un exercice (.js)">
          ⬆ Charger
          <input type="file" id="ex-file-input" accept=".js" style="display:none">
      </label>
    </div>

    <div id="ex-instructions">Chargez un exercice pour commencer.</div>

    <img id="ex-ref-image" src="" alt="Référence" style="display:none">

    <!-- Grille orthographique 3×3 -->
    <div id="ex-zones" style="display:none">
      <div class="ortho-grid">
        <div class="ortho-cell"></div>
        <div class="ortho-cell ortho-zone zone-state-neutral" id="zone-top">
          <span class="zone-label">Dessus</span>
        </div>
        <div class="ortho-cell"></div>
        <div class="ortho-cell ortho-zone zone-state-neutral" id="zone-left">
          <span class="zone-label">Gauche</span>
        </div>
        <div class="ortho-cell ortho-zone zone-state-neutral" id="zone-center">
          <span class="zone-label">Face</span>
        </div>
        <div class="ortho-cell ortho-zone zone-state-neutral" id="zone-right">
          <span class="zone-label">Droite</span>
        </div>
        <div class="ortho-cell"></div>
        <div class="ortho-cell ortho-zone zone-state-neutral" id="zone-bottom">
          <span class="zone-label">Dessous</span>
        </div>
        <div class="ortho-cell"></div>
      </div>
    </div>

    <div id="ex-actions">
      <button id="ex-btn-validate" class="ex-btn ex-btn-primary">✔ Valider</button>
      <button id="ex-btn-next" class="ex-btn">Suivant →</button>
      <button id="ex-btn-reset" class="ex-btn ex-btn-danger">↺ Réinit.</button>
    </div>
    </div><!-- end #exercise-panel -->
  </div><!-- end #main-area -->
</div><!-- end #app -->

  <!-- Dialogue de propriétés -->
  <div id="properties-panel" class="hidden">
    <div id="properties-header">
      <h4 id="prop-title">Propriétés</h4>
      <button id="prop-close">✕</button>
    </div>
    <div id="properties-content"></div>
  </div><!-- end #properties-panel -->

  <!-- Dialogue de saisie angle/distance pour rotation/translation -->
  <div id="input-dialog" class="hidden">
    <div id="input-dialog-inner">
      <h4 id="input-dialog-title">Paramètre</h4>
      <input type="number" id="input-dialog-field" step="any"/>
      <div id="input-dialog-btns">
        <button id="input-dialog-ok">OK</button>
        <button id="input-dialog-cancel">Annuler</button>
      </div>
    </div>
  </div>

  <script src="geometry.js"></script>
</body>
</html>
